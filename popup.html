<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: sans-serif;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #1d4ed8;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h3>RAG Scraper</h3>
  <button id="scrapeBtn">Copy Markdown</button>
  <div id="status"></div>
  <script src="popup.js"></script>

<div style="margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; text-align: center;">
  <p style="font-size: 11px; color: #666; margin-bottom: 8px;">Support development:</p>
  <div style="display: flex; justify-content: space-around;">
    <a href="https://github.com/impkit/rag-markdown-scraper" target="_blank" style="font-size: 11px; color: #2563eb; text-decoration: none; font-weight: bold;">
      ⭐ Star on GitHub
    </a>
  </div>
</div>


</body>
</html>
