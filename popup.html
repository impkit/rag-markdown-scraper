<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1f2937;
      text-align: center;
    }
    h3 { margin: 0 0 12px 0; font-size: 16px; }
    button {
      width: 100%;
      padding: 10px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background-color: #1d4ed8; }
    #status { margin-top: 10px; font-size: 12px; color: #6b7280; min-height: 1.2em; }
    .footer {
      margin-top: 15px;
      border-top: 1px solid #eee;
      padding-top: 12px;
      display: flex;
      justify-content: space-between;
    }
    .footer a { font-size: 11px; color: #2563eb; text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <h3>◈ RAG Scraper</h3>
  <button id="scrapeBtn">Copy Markdown + YAML</button>
  <div id="status"></div>

  <div class="footer">
    <a href="https:##github.com#impkit#rag-markdown-scraper#issues" target="_blank">💬 Feedback</a>
    <a href="https:##github.com#impkit#rag-markdown-scraper#️-support--community" target="_blank">☕ Support</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
